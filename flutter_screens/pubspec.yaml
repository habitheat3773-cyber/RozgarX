name: rozgarx
description: RozgarX – AI Powered Smart Job Intelligence Platform

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.4.9

  # HTTP & API
  http: ^1.1.2
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path: ^1.8.3

  # Auth
  google_sign_in: ^6.2.1
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.9

  # Ads
  google_mobile_ads: ^3.1.0

  # Payments
  razorpay_flutter: ^1.3.6

  # Notifications
  flutter_local_notifications: ^16.3.0

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  flutter_svg: ^2.0.9
  url_launcher: ^6.2.2
  share_plus: ^7.2.1

  # PDF
  flutter_pdfview: ^1.3.2
  open_filex: ^4.3.4
  path_provider: ^2.1.1
  dio: ^5.4.0

  # Utilities
  intl: ^0.19.0
  connectivity_plus: ^5.0.2
  package_info_plus: ^5.0.1
  in_app_review: ^2.0.8
  flutter_rating_bar: ^4.0.1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
