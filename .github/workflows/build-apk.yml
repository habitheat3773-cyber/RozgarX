name: rozgarx
description: RozgarX Job Alert Application
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # State Management
  provider: ^6.1.2

  # Networking
  http: ^1.2.1
  dio: ^5.4.3+1

  # Firebase (optional – remove if not using)
  firebase_core: ^2.30.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.17.0
  firebase_messaging: ^14.9.0

  # Local Storage
  shared_preferences: ^2.2.3

  # UI
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
